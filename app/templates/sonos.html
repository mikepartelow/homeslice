<!doctype html>
<title>Sonos-es</title>
{% for s in sonos|sort(attribute='name') %}
  <div>
    {{ s['name'] }}
    |
    volume: {{ s['volume'] }}
    |
    mute: {{ s['mute'] }}
    {% if s['is_coordinator'] %}
      | ( coordinator )
    {% endif %}
  </div>
{% endfor %}

<br />

<form action="/api/v0/sonos/reboot/" method="POST">
  <input type="submit" value="rebootem">
</form>
